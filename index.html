<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="google-site-verification" content="kQiSoyAjPsW2ze3h5LZSwGuZVzGHEcFU7ysM67n0SkQ" />
    <meta name="yandex-verification" content="bd24149313adf514" />

    <!-- Home SEO shell: vite/injectIndexHtmlSeo.ts fills from seo_page_settings (same rules as HomePage + /admin/seo). -->
    <title>__SEO_TITLE__</title>
    <meta name="description" content="__SEO_DESCRIPTION__" />
    <meta name="keywords" content="__SEO_KEYWORDS__" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="__SEO_CANONICAL__" />

    <!-- PWA / Theming -->
    <meta name="theme-color" content="#0fb6c9" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sakina" />
    <meta name="color-scheme" content="light only" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />

    <!-- Preconnects/Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Social (Open Graph / Twitter) — home defaults from CMS; og:image from extra_meta or site default -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="Sakina" />
    <meta property="og:title" content="__SEO_TITLE__" />
    <meta property="og:description" content="__SEO_DESCRIPTION__" />
    <meta property="og:url" content="__SEO_CANONICAL__" />
    <meta property="og:image" content="__SEO_OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__SEO_TITLE__" />
    <meta name="twitter:description" content="__SEO_DESCRIPTION__" />
    <meta name="twitter:image" content="__SEO_OG_IMAGE__" />

    <link rel="alternate" href="__SITE_BASE__/" hreflang="ru" />
    <link rel="alternate" href="__SITE_BASE__/" hreflang="x-default" />

    <!-- Structured Data (Organization + Website) — base URL from VITE_SITE_URL -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Sakina",
        "url": "__SITE_BASE__/",
        "logo": "__SITE_BASE__/favicon/android-chrome-192x192.png",
        "sameAs": [
          "https://www.facebook.com/",
          "https://www.instagram.com/"
        ],
        "contactPoint": [{
          "@type": "ContactPoint",
          "telephone": "+992905339595",
          "contactType": "customer service",
          "areaServed": "TJ",
          "availableLanguage": "ru"
        }]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sakina",
        "url": "__SITE_BASE__/"
      }
    </script>
  </head>

  <body>
    <noscript>Для корректной работы сайта включите JavaScript.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
